seed: 0
run_dir: runs/stage5
data:
  name: synthetic
  root: data/raw/LJSpeech-1.1
  sample_rate: 24000
  segment_seconds: 3.0
  batch_size: 8
  num_workers: 0
  max_items: null
  synthetic_items: 512
model:
  base_channels: 24
  channel_mults: [2, 4, 4, 8]
  # 4 * 8 * 8 * 8 = 2048  ->  24000 / 2048 ≈ 11.72 Hz latent frame rate
  strides: [4, 8, 8, 8]
  latent_dim: 64
optim:
  lr: 2.0e-4
train:
  max_steps: 2000
  log_every: 50
  val_every: 500
  sample_every: 500
  grad_clip: 1.0
loss:
  lambda_time: 1.0
  lambda_stft: 1.0
